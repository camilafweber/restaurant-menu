<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f1b037",
              "background-light": "#f8f7f6",
              "background-dark": "#221c10",
            },
            fontFamily: {
              display: ["Plus Jakarta Sans", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <title>{{ name }}</title>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased"
  >
    <div class="relative flex min-h-screen flex-col">
      <!-- Navigation Bar -->
      <header
        class="sticky top-0 z-50 w-full border-b border-primary/10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md"
      >
        <div
          class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4"
        >
          <div class="flex items-center gap-10">
            <div class="flex items-center gap-2">
              <div
                class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-background-dark"
              ></div>
            </div>
            <nav class="hidden md:flex items-center gap-8">
              <a
                class="text-sm font-semibold hover:text-primary transition-colors"
                href="/dishes"
                >Menu</a
              >
              <a
                class="text-sm font-semibold hover:text-primary transition-colors"
                href="#"
                >Orders</a
              >
              <a
                class="text-sm font-semibold hover:text-primary transition-colors"
                href="#"
                >Locations</a
              >
              <a
                class="text-sm font-semibold hover:text-primary transition-colors"
                href="#"
                >About</a
              >
            </nav>
          </div>
          <div class="flex items-center gap-4">
            <div class="relative hidden sm:block">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
                >search</span
              >
              <input
                class="h-10 w-64 rounded-xl border-none bg-primary/5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary"
                placeholder="Search menu..."
                type="text"
              />
            </div>
            <button
              class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-slate-900 dark:text-slate-100 hover:bg-primary/20 transition-colors"
            >
              <span class="material-symbols-outlined">shopping_cart</span>
            </button>
            <div
              class="h-10 w-10 rounded-full border-2 border-primary overflow-hidden"
            >
              <img
                class="h-full w-full object-cover"
                data-alt="User profile picture showing a friendly face"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaiEA6uhNlUjr8ZlnuBAPHczTXjXdF50y5Tv37op9dpm97YGuJ8G_yvkypzS5P0gxxJwCwaq3LXLKNrmagOj6iZ9blRU85vpvZZx3QLtM_GG8QcpHRX0NpSLo4z6nSF2j14DYZOt1EEk4eX1sJzU58lyJsq9lRy73df7UKsgpGYq2ept3ErSTktRErC9aDHQ6QKvMqNJRdwtjYEoCgJ6Vg-5gJnqYmKUQvRX_DEBdzbAdCD3QwsOoWuHdLz0CU0tHyPUoip9QR5Gw"
              />
            </div>
          </div>
        </div>
      </header>
      <main class="mx-auto max-w-7xl px-6 py-10 lg:py-16">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
          <div
            class="w-full max-w-[500px] aspect-square overflow-hidden rounded-3xl bg-primary/5 shadow-2xl mx-auto lg:mx-0"
          >
            <img
              class="w-full h-full object-cover"
              alt="{{ name }}"
              src="/static_dish/images/{{ image_url}}"
            />
          </div>

          <div class="flex flex-col">
            <div class="mb-6">
              <h1
                class="text-4xl lg:text-5xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100"
              >
                {{ name }}
              </h1>
              <p class="mt-2 text-lg font-medium text-primary">
                {{ category }}
              </p>
            </div>

            <div class="mb-6 flex items-center gap-4">
              <div
                class="rounded-2xl bg-primary/10 px-5 py-3 text-3xl font-black text-primary border border-primary/20"
              >
                R$ {{ "%.2f"|format(price) }}
              </div>
              <div
                class="flex items-center gap-2 bg-slate-50 dark:bg-white/5 px-4 py-2 rounded-xl"
              >
                <span class="material-symbols-outlined text-primary fill-1"
                  >star</span
                >
                <span class="font-bold">{{ rating }}</span>
              </div>
            </div>

            <div class="prose dark:prose-invert mb-10">
              <p
                class="text-lg leading-relaxed text-slate-600 dark:text-slate-400"
              >
                {{ descript }}
              </p>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-4 mt-6">
              <div
                class="flex h-14 items-center rounded-2xl bg-primary/10 px-2"
              >
                <button
                  class="h-10 w-10 flex items-center justify-center rounded-xl hover:bg-primary/20"
                >
                  <span class="material-symbols-outlined">remove</span>
                </button>
                <span class="w-12 text-center text-xl font-bold">1</span>
                <button
                  class="h-10 w-10 flex items-center justify-center rounded-xl bg-primary text-background-dark"
                >
                  <span class="material-symbols-outlined">add</span>
                </button>
              </div>
              <button
                class="h-14 flex-1 w-full bg-primary text-background-dark text-lg font-bold rounded-2xl shadow-xl shadow-primary/20 hover:scale-[1.02] transition-all flex items-center justify-center gap-3"
              >
                <span class="material-symbols-outlined">shopping_bag</span>
                Add to Order
              </button>
            </div>
          </div>
        </div>
      </main>
      <footer
        class="mt-auto border-t border-primary/10 bg-background-light dark:bg-background-dark py-12"
      >
        <div class="mx-auto max-w-7xl px-6">
          <div
            class="flex flex-col items-center justify-between gap-6 md:flex-row"
          >
            <div class="flex items-center gap-2"></div>
            <div class="flex gap-8 text-sm text-slate-500">
              <a class="hover:text-primary" href="#">Privacy Policy</a>
              <a class="hover:text-primary" href="#">Terms of Service</a>
              <a class="hover:text-primary" href="#">Contact Us</a>
            </div>
            <div class="flex gap-4">
              <button
                class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center hover:bg-primary hover:text-background-dark transition-all"
              >
                <span class="material-symbols-outlined text-xl">share</span>
              </button>
              <button
                class="h-10 w-10 rounded-full bg-primary/10 flex items-center justify-center hover:bg-primary hover:text-background-dark transition-all"
              >
                <span class="material-symbols-outlined text-xl">thumb_up</span>
              </button>
            </div>
          </div>
          <p class="mt-8 text-center text-xs text-slate-400">
            All rights reserved.
          </p>
        </div>
      </footer>
    </div>
  </body>
</html>
